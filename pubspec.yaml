name: gurukul_academy_erp
description: Production-ready school ERP foundation for Gurukul Academy.
publish_to: none

version: 0.1.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  connectivity_plus: ^7.2.0
  flutter_dotenv: ^6.0.1
  flutter_riverpod: ^3.3.2
  go_router: ^17.3.0
  intl: ^0.20.3
  shared_preferences: ^2.5.5
  supabase_flutter: ^2.16.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  mocktail: ^1.0.5

flutter:
  uses-material-design: true
  assets:
    - .env
    - assets/images/
